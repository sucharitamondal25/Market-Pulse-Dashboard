kind = "web"
previewPath = "/"
title = "India Market Sentiment Dashboard"
version = "1.0.0"
id = "artifacts/india-market-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19521

[services.development]
run = "pnpm --filter @workspace/india-market-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/india-market-dashboard", "run", "build" ]
publicDir = "artifacts/india-market-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19521"
BASE_PATH = "/"
